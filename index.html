<!DOCTYPE html>
<html>
<head>
    <title>Custom Audio Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Joy's Audio Player</h2>

    <!-- Audio element -->
    <audio id="audio" src="audio.mp3"></audio>

    <!-- Controls -->
    <button onclick="playAudio()">▶️</button>
    <button onclick="pauseAudio()">⏸️</button>
    <button onclick="skipForward()">⏭️</button>
    <button onclick="skipBackward()">⏮️</button>
    <button onclick="volumeDown()">🔉</button>
    <button onclick="volumeUp()">🔊</button>

    <!-- Extra feature: Mute -->
    <button onclick="toggleMute()">Mute/Unmute</button>

    <!-- Display time -->
    <p id="time">0:00</p>

    <script src="script.js"></script>

</body>
</html>
